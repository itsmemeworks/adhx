name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger for debugging or special cases
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to run CI on'
        required: false
        type: string
  # Trigger when Release Please workflow completes (to run CI on release PRs)
  # This works because workflow_run events ARE triggered even when the
  # original workflow used GITHUB_TOKEN
  workflow_run:
    workflows: ['Release Please']
    types: [completed]

# Permissions needed for:
# - checks: write - to create check runs for release PRs
# - contents: read - default permission to checkout code
permissions:
  checks: write
  contents: read

jobs:
  # Create check run for release PRs when triggered by Release Please workflow
  # Uses GitHub Checks API to report status on the PR's HEAD commit
  release-pr-check:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create check run for release PR
        uses: actions/github-script@v9
        with:
          script: |
            // Find open release PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:release-please--branches--main`,
              state: 'open'
            });

            if (prs.length === 0) {
              console.log('No open release PR found, skipping');
              return;
            }

            const pr = prs[0];
            console.log(`Found release PR #${pr.number} with head SHA: ${pr.head.sha}`);

            // Create check runs on the PR's HEAD commit to satisfy branch
            // protection's required checks. Release PRs only bump version /
            // changelog, so the real CI jobs are skipped — synthesize a passing
            // check for each required context.
            for (const name of ['build', 'format']) {
              const { data: checkRun } = await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: `Release PR ${name} check`,
                  summary: 'Release PRs skip full CI - only version/changelog updates.',
                  text: `This check was created automatically for release PR #${pr.number}.\n\nRelease PRs only contain automated version bumps and changelog updates, so full CI is skipped.`
                }
              });
              console.log(`✅ Created '${name}' check run ${checkRun.id} for PR #${pr.number}`);
            }

  build:
    runs-on: ubuntu-latest
    # Skip for workflow_run events (handled by release-pr-check job)
    # For pull_request events, skip release-please PRs
    # For push events, always run
    if: |
      github.event_name != 'workflow_run' &&
      (github.event_name == 'push' || !startsWith(github.head_ref || '', 'release-please--'))
    steps:
      - uses: actions/checkout@v6

      # Version is read from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  # Dedicated formatting gate. Kept as its own job (rather than a step in `test`)
  # so it surfaces as a distinct required status check on PRs.
  format:
    if: |
      github.event_name != 'workflow_run' &&
      (github.event_name == 'push' || !startsWith(github.head_ref || '', 'release-please--'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Version is read from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (prettier)
        run: pnpm format:check

  test:
    # Skip for release-please PRs (only update version/changelog) and workflow_run events
    # For push events, always run
    if: |
      github.event_name != 'workflow_run' &&
      (github.event_name == 'push' || !startsWith(github.head_ref || '', 'release-please--'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Version is read from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
