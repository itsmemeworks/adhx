# Fly.io configuration for ADHX
# See https://fly.io/docs/reference/configuration/

app = 'adhx'
primary_region = 'lhr'

[build]

[env]
  NODE_ENV = 'production'
  DATABASE_PATH = '/data/adhx.db'
  SENTRY_ENVIRONMENT = 'staging'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Health check for application-level monitoring
  # timeout raised from 2s: a burst of public /trending traffic can briefly
  # saturate the single better-sqlite3 event loop, and a too-tight timeout
  # false-positives the probe into restart-looping an otherwise-healthy machine.
  [[http_service.checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '15s'
    method = 'get'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = 'adhx_data'
  destination = '/data'
