# Fly.io configuration for ADHX Production
# See https://fly.io/docs/reference/configuration/

app = 'adhx-prod'
primary_region = 'lhr'

[build]

[env]
  NODE_ENV = 'production'
  DATABASE_PATH = '/data/adhx.db'
  SENTRY_ENVIRONMENT = 'production'
  # OAuth callback host. adhx.com ends in "x.com", which X's logged-out login
  # flow rewrites to "twitter.com" (→ adhtwitter.com), breaking login for users
  # not already signed into X. The Fly host has no "x.com", so X leaves it alone;
  # the callback route then bounces back to adhx.com to set the session cookie.
  # This exact URL must also be registered as a callback in the X Developer Portal.
  TWITTER_OAUTH_REDIRECT_URI = 'https://adhx-prod.fly.dev/api/auth/twitter/callback'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Health check for application-level monitoring
  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '10s'
    method = 'get'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = 'adhx_prod_data'
  destination = '/data'
